name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm ci
      - name: Sequelize sync check
        run: |
          node -e "require('./src/models').sequelize.sync({ alter: true }).then(()=>console.log('synced')).catch((e)=>{ console.error(e); process.exit(1); })"
      - name: Run backend tests
        run: npm test
