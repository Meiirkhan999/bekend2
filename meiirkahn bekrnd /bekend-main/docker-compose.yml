version: '3.9'
services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - ./server:/app
      - ./server/database.sqlite:/app/database.sqlite
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://backend:3001
    restart: unless-stopped
